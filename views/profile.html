<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - Arsi HR Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-container">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="logo">
          <h1>Arsi HR Hub</h1>
          <p>HR Management System</p>
        </div>

        <div class="menu">
          <a href="admin-dashboard.html" class="menu-item">
            <i class="menu-icon fas fa-tachometer-alt"></i>
            Dashboard
          </a>
          <a href="employee-directory.html" class="menu-item">
            <i class="menu-icon fas fa-users"></i>
            Employees
          </a>
          <a href="leave-management.html" class="menu-item">
            <i class="menu-icon fas fa-calendar-alt"></i>
            Leave Management
          </a>
          <a href="profile.html" class="menu-item active">
            <i class="menu-icon fas fa-user"></i>
            Profile
          </a>
          <a href="#" id="logoutBtn" class="menu-item">
            <i class="menu-icon fas fa-sign-out-alt"></i>
            Sign Out
          </a>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <div class="header">
          <h2>My Profile</h2>
          <p>View your personal information</p>
        </div>

        <!-- Profile Details -->
        <div class="table-container">
          <div id="profileInfo">
            <!-- Profile data will be loaded here -->
            <div style="text-align: center; padding: 40px; color: #666">
              Loading profile information...
            </div>
          </div>

          <div style="margin-top: 30px; display: flex; gap: 15px">
            <button
              id="editProfileBtn"
              class="btn"
              style="width: auto; padding: 10px 20px"
            >
              <i class="fas fa-edit"></i> Edit Profile
            </button>
            <button
              onclick="window.location.href='change-password.html'"
              class="btn"
              style="width: auto; padding: 10px 20px; background: #666"
            >
              <i class="fas fa-key"></i> Change Password
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal">
      <div class="modal-content">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
          "
        >
          <h3>Edit Profile</h3>
          <button class="modal-close">&times;</button>
        </div>

        <form id="editProfileForm">
          <div
            style="
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 15px;
              margin-bottom: 15px;
            "
          >
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" name="fullName" class="form-control" />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" name="email" class="form-control" />
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" name="phone" class="form-control" />
            </div>
            <div class="form-group">
              <label>Date of Birth</label>
              <input type="date" name="dateOfBirth" class="form-control" />
            </div>
            <div class="form-group">
              <label>Department</label>
              <select name="department" class="form-control">
                <option value="">Select Department</option>
                <option value="Human Resources">Human Resources</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Business Administration">
                  Business Administration
                </option>
                <option value="Mathematics">Mathematics</option>
                <option value="Engineering">Engineering</option>
                <option value="Natural Sciences">Natural Sciences</option>
              </select>
            </div>
            <div class="form-group">
              <label>Position</label>
              <input type="text" name="position" class="form-control" />
            </div>
            <div class="form-group">
              <label>Emergency Contact Name</label>
              <input type="text" name="emergencyName" class="form-control" />
            </div>
            <div class="form-group">
              <label>Emergency Contact Phone</label>
              <input type="tel" name="emergencyPhone" class="form-control" />
            </div>
            <div class="form-group">
              <label>Emergency Contact Relationship</label>
              <input
                type="text"
                name="emergencyRelationship"
                class="form-control"
              />
            </div>
            <div class="form-group" style="grid-column: span 2">
              <label>Address</label>
              <textarea name="address" class="form-control" rows="2"></textarea>
            </div>
          </div>

          <div
            style="
              margin-top: 20px;
              display: flex;
              gap: 10px;
              justify-content: flex-end;
            "
          >
            <button
              type="button"
              class="btn"
              style="background: #666; width: auto"
              onclick="document.getElementById('editProfileModal').style.display='none'"
            >
              Cancel
            </button>
            <button type="submit" class="btn" style="width: auto">
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/profile.js"></script>
  </body>
</html>
