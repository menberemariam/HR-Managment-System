<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - Arsi HR Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-container">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="logo">
          <h1>Arsi HR Hub</h1>
          <p>HR Management System</p>
        </div>

        <div class="menu">
          <a href="admin-dashboard.html" class="menu-item">
            <i class="menu-icon fas fa-tachometer-alt"></i>
            Dashboard
          </a>
          <a href="employee-directory.html" class="menu-item">
            <i class="menu-icon fas fa-users"></i>
            Employees
          </a>
          <a href="leave-management.html" class="menu-item">
            <i class="menu-icon fas fa-calendar-alt"></i>
            Leave Management
          </a>
          <a href="profile.html" class="menu-item">
            <i class="menu-icon fas fa-user"></i>
            Profile
          </a>
          <a href="#" id="logoutBtn" class="menu-item">
            <i class="menu-icon fas fa-sign-out-alt"></i>
            Sign Out
          </a>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <div class="header">
          <h2>Change Password</h2>
          <p>Update your account password</p>
        </div>

        <!-- Change Password Form -->
        <div class="table-container">
          <form id="changePasswordForm">
            <div style="max-width: 500px; margin: 0 auto">
              <div class="form-group">
                <label>Current Password *</label>
                <input
                  type="password"
                  name="currentPassword"
                  class="form-control"
                  required
                />
              </div>
              <div class="form-group">
                <label>New Password *</label>
                <input
                  type="password"
                  name="newPassword"
                  class="form-control"
                  required
                />
                <small style="color: #666"
                  >Password must be at least 6 characters long</small
                >
              </div>
              <div class="form-group">
                <label>Confirm New Password *</label>
                <input
                  type="password"
                  name="confirmPassword"
                  class="form-control"
                  required
                />
              </div>

              <div style="margin-top: 30px; display: flex; gap: 15px">
                <button
                  type="button"
                  class="btn"
                  style="background: #666; width: auto; padding: 10px 20px"
                  onclick="window.location.href='profile.html'"
                >
                  Back to Profile
                </button>
                <button
                  type="submit"
                  class="btn"
                  style="width: auto; padding: 10px 20px"
                >
                  Change Password
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/profile.js"></script>
  </body>
</html>
